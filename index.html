<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fridays in Paris – 2025–2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #1A3A2A;
    --purple-light: #2A5A3F;
    --cream: #F8F5F0;
    --charcoal: #1C1C1C;
    --stone: #8C8279;
    --rust: #B5451B;
    --gold: #C9A84C;
    --light: #EDEAE4;
    --white: #FFFFFF;
    --green: #2A7A2A;
    --blue: #1C5FA8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Disable text selection everywhere to fix mobile tap issues */
  html, body, * {
    -webkit-user-select: none;
       -moz-user-select: none;
        -ms-user-select: none;
            user-select: none;
    touch-action: manipulation;           /* Fast taps, no double-tap zoom delay */
  }

  /* Re-enable selection only in actual readable text areas */
  p, li, .tour-row-name, .detail-desc, blockquote, h1, h2, h3, .home-hero p, .about-hero p, .rule-text p, .vol-body {
    -webkit-user-select: text;
       -moz-user-select: text;
        -ms-user-select: text;
            user-select: text;
  }

  body {
    font-family: 'Inter', 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    font-weight: 300;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
  }

  /* Make sure buttons and tappable elements are fully interactive */
  button, a, [onclick], .month-pill, .visitors-nav-btn, .nav-member-btn, .members-pill {
    -webkit-user-select: auto !important;
       -moz-user-select: auto !important;
        -ms-user-select: auto !important;
            user-select: auto !important;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #4A5568;
    transition: background 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 60px;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    letter-spacing: 0.02em;
    color: var(--white);
    text-decoration: none;
    line-height: 1.2;
  }

  .nav-logo span {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    font-family: 'DM Sans', sans-serif;
  }

  .nav-links {
    display: flex;
    gap: 1.5rem;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: rgba(255,255,255,0.7);
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: var(--white);
  }

  .nav-member-btn {
    background: rgba(255,255,255,0.15);
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.4);
    padding: 0.45rem 1.1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .nav-member-btn:hover {
    background: rgba(255,255,255,0.28);
  }

  .visitors-nav-btn {
    background: var(--gold);
    color: var(--charcoal);
    border: none;
    padding: 0.45rem 1.1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    font-weight: 600;
  }

  .visitors-nav-btn:hover {
    background: #c09b2a;
    color: var(--white);
  }

  /* ──────────────────────────────────────────────
     MEDIA QUERIES – MOBILE IMPROVEMENTS
  ────────────────────────────────────────────── */
  @media (max-width: 768px) {
    nav {
      padding: 0 1rem;
      flex-wrap: wrap;
      height: auto;
    }

    .nav-links {
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin: 0.5rem 0;
    }

    .month-pill, .members-pill, .visitors-nav-btn, .nav-member-btn {
      padding: 0.7rem 1.2rem;
      min-height: 44px;
      min-width: 44px;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .season-bar, .members-filter-bar {
      padding: 0.8rem 1rem;
      overflow: visible;
      flex-wrap: wrap;
    }

    .home-hero {
      padding: 2.5rem 1.5rem 2rem;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .tour-row {
      grid-template-columns: 60px 1fr;
      gap: 0.5rem;
      padding: 0.6rem 0.8rem;
    }

    .tour-photo {
      display: none;
    }

    .vm-row, .rm-row {
      flex-direction: column;
      gap: 0.8rem;
    }

    .vm-field input, .vm-field textarea, .vm-field select,
    .rm-field input, .rm-field select {
      font-size: 1rem;
      padding: 0.8rem;
    }

    .vm-submit, .rm-submit {
      font-size: 1rem;
      padding: 1rem;
    }
  }

  /* ──────────────────────────────────────────────
     REST OF YOUR ORIGINAL STYLES (kept intact)
  ────────────────────────────────────────────── */
  /* ... paste all your remaining CSS here ... */
  /* For brevity I won't repeat the 20,000+ lines, but keep everything below this comment exactly as in your original file */

  /* VISITORS MODAL, RESERVE MODAL, HERO, FILTER BAR, CALENDAR, TOUR ROWS, MEMBERS AREA, etc. */
  /* Just make sure the new rules at the top override any conflicting ones */

</style>
</head>
<body>

<!-- YOUR ORIGINAL HTML CONTENT HERE – unchanged except for script addition at bottom -->

<nav>
  <a class="nav-logo" href="#" onclick="showPage('home');return false;">
    Fridays in Paris
    <span>2025–2026</span>
  </a>
  <ul class="nav-links">
    <li><button class="visitors-nav-btn" onclick="openVisitorsModal()">Visitors</button></li>
  </ul>
  <button class="nav-member-btn" id="btn-members" onclick="openLoginModal()">Members &#8599;</button>
  <button class="nav-member-btn" id="btn-home" onclick="showPage('home')" style="display:none">&#8592; Home</button>
</nav>

<!-- ... rest of your page content (hero, calendar, members sections, modals, etc.) ... -->

<!-- ADD THIS SCRIPT AT THE VERY END, BEFORE </body> -->
<script>
// 1. Touch fallback – force taps to trigger click events on mobile
document.addEventListener('touchend', function(e) {
  const target = e.target.closest('button, a, [onclick], .month-pill, .visitors-nav-btn, .nav-member-btn, .members-pill');
  if (target && !target.disabled) {
    // Trigger the click event manually
    target.click();
  }
}, { passive: true });

// 2. Optional: Log taps in console for debugging (remove later if not needed)
document.addEventListener('click', function(e) {
  console.log('Click detected on:', e.target);
}, true);
</script>

</body>
</html>
